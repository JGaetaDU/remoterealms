<!DOCTYPE html>
<html lang="en">
<head>

  <title>Remote Realms Calculator</title>
  <style>
    :root {
      --bg: #091224;
      --panel: rgba(10, 20, 40, 0.92);
      --text: #eef3ff;
      --muted: #b8c3dd;
      --border: rgba(122, 145, 191, 0.25);
      --accent: #8b5cf6;
      --accent-soft: rgba(139, 92, 246, 0.18);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 30%),
        radial-gradient(circle at left center, rgba(139, 92, 246, 0.1), transparent 30%),
        linear-gradient(180deg, var(--bg) 0%, #07101f 100%);
      line-height: 1.5;
    }
    .container { width: min(1220px, calc(100% - 32px)); margin: 24px auto 48px; }
    .hero, .card { background: var(--panel); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow); }
    .hero { padding: 24px; margin-bottom: 24px; }
    h1, h2, h3 { margin: 0 0 12px; }
    h1 { font-size: clamp(1.8rem, 3vw, 3rem); }
    h2 { font-size: 1.6rem; }
    h3 { font-size: 1.05rem; }
    p { margin: 0 0 12px; color: var(--muted); }
    .small { font-size: 0.92rem; color: var(--muted); }
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .pill {
      display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 999px;
      background: var(--accent-soft); border: 1px solid rgba(139, 92, 246, 0.32);
      color: #ddd6fe; font-size: 0.86rem; font-weight: 700;
    }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin: 0 0 24px; }
    .tab-button {
      border: 1px solid var(--border); background: rgba(55, 65, 81, 0.35); color: var(--text);
      padding: 12px 18px; border-radius: 999px; font-weight: 700; cursor: pointer; transition: 0.2s ease;
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
    }
    .tab-button:hover { transform: translateY(-1px); }
    .tab-button.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 18px; }
    .card { grid-column: span 12; padding: 22px; }
    .half { grid-column: span 6; }
    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-top: 14px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .mode-group { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 10px; }
    .radio-label { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text); }
    label { font-weight: 700; color: var(--text); }
